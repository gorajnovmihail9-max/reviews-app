<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EROS</title>
    <style>
        /* Оригинальные шрифты Telegram */
        body { 
            background: #0e1621; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji"; 
            margin: 0; 
            padding: 0; 
            -webkit-font-smoothing: antialiased;
        }
        
        /* Центрированная шапка */
        .header { 
            background: #17212b; 
            padding: 8px 0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            position: sticky; 
            top: 0; 
            z-index: 10; 
            border-bottom: 1px solid #242f3d; 
            height: 44px; /* Стандартная высота тулбара */
        }
        
        .header h1 { 
            margin: 0; 
            font-size: 17px; 
            font-weight: 600; 
            line-height: 20px;
        }
        
        .header p { 
            margin: 0; 
            font-size: 13px; 
            color: #7f91a4; 
            line-height: 16px;
        }
        
        .chat { 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
        }

        .date-separator { 
            text-align: center; 
            margin: 15px 0 10px 0; 
        }

        .date-separator span { 
            background: rgba(24, 37, 51, 0.7); 
            color: #fff; 
            padding: 2px 10px; 
            border-radius: 12px; 
            font-size: 13px; 
            font-weight: 500;
        }

        /* Контейнер сообщения с аватаром */
        .message-row {
            display: flex;
            align-items: flex-end; /* Аватар прижат к низу сообщения */
            gap: 8px;
            margin-bottom: 4px;
        }

        /* Круглый аватар */
        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            flex-shrink: 0;
            text-transform: uppercase;
        }

        /* Пузырь сообщения */
        .message-bubble { 
            background: #182533; 
            padding: 6px 10px 22px 10px; /* Большой отступ снизу под время */
            border-radius: 12px 12px 12px 4px; 
            max-width: 75%; 
            position: relative; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        
        .msg-name { 
            font-size: 14px; 
            font-weight: 600; 
            margin-bottom: 2px;
            display: block;
        }
        
        .msg-text { 
            font-size: 15px; 
            line-height: 1.4; 
            color: #fff; 
            word-wrap: break-word;
        }
        
        .msg-time { 
            position: absolute; 
            bottom: 4px; 
            right: 8px; 
            font-size: 11px; 
            color: #6b7d90; 
        }

        /* Цвета аватарок как в ТГ */
        .color-0 { background: #ee675c; } /* Red */
        .color-1 { background: #4ec034; } /* Green */
        .color-2 { background: #f09a37; } /* Orange */
        .color-3 { background: #50a2e3; } /* Blue */
        .color-4 { background: #a695e7; } /* Purple */
        .color-5 { background: #ef799e; } /* Pink */
        .color-6 { background: #4cc6ac; } /* Cyan */
    </style>
</head>
<body>

    <div class="header">
        <h1>EROS</h1>
        <p>1,500 members</p>
    </div>

    <div class="chat" id="chat-container"></div>

    <script>

            { name: "liam_n", text: "I have a very specific set of requests... $300." },
            { name: "mason_m", text: "$500 for the ultimate experience pics." },
            { name: "noah_a", text: "$200 for a quick snap?" },
            { name: "oliver_t", text: "Please, I'll pay $100." },
            { name: "peter_p", text: "$300 for the good stuff?" },
            { name: "quinn_m", text: "$400 is my final offer." },
            { name: "robert_d", text: "I have $500 for u." },
            { name: "sam_s", text: "$200. Let's do this." }
        ];

        // Функция получения цвета на основе имени (чтобы у одного юзера всегда был один цвет)
        function getColorClass(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }
            return 'color-' + (Math.abs(hash) % 7);
        }

        // Функция получения имени автора (имя или первая буква)
        function getInitials(name) {
            return name.charAt(0).toUpperCase();
        }

        const chatContainer = document.getElementById('chat-container');
        let commentIndex = 0;

        for (let day = 1; day <= 15; day++) {
            const dateDiv = document.createElement('div');
            dateDiv.className = 'date-separator';
            dateDiv.innerHTML = `<span>April ${day}</span>`;
            chatContainer.appendChild(dateDiv);

            let commentsToday = (day % 3 === 0) ? 4 : 3; 
            let currentHour = Math.floor(Math.random() * 8) + 8;
            let currentMinute = Math.floor(Math.random() * 60);

            for (let i = 0; i < commentsToday; i++) {
                if (commentIndex >= comments.length) break;
                const comment = comments[commentIndex];
                const timeString = `${currentHour.toString().padStart(2, '0')}:${currentMinute.toString().padStart(2, '0')}`;
                
                const colorClass = getColorClass(comment.name);
                const initial = getInitials(comment.name);

                const rowDiv = document.createElement('div');
                rowDiv.className = 'message-row';
                rowDiv.innerHTML = `
                    <div class="user-avatar ${colorClass}">${initial}</div>
                    <div class="message-bubble">
                        <span class="msg-name ${colorClass.replace('bg', 'text')}">${comment.name}</span>
                        <div class="msg-text">${comment.text}</div>
                        <div class="msg-time">${timeString}</div>
                    </div>
                `;
                chatContainer.appendChild(rowDiv);

                currentMinute += Math.floor(Math.random() * 45) + 5;
                if (currentMinute >= 60) {
                    currentHour += 1;
                    currentMinute -= 60;
                }
                commentIndex++;
            }
        }
    </script>
</body>
</html>
