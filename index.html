<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EROS</title>
    <style>
        body { 
            background: #0e1621; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            -webkit-font-smoothing: antialiased;
        }
        
        /* Шапка по центру */
        .header { 
            background: #17212b; 
            padding: 8px 0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            position: sticky; 
            top: 0; 
            z-index: 10; 
            border-bottom: 1px solid #242f3d; 
            height: 46px;
        }
        
        .header h1 { 
            margin: 0; 
            font-size: 17px; 
            font-weight: 600; 
        }
        
        .header p { 
            margin: 0; 
            font-size: 13px; 
            color: #7f91a4; 
        }
        
        .chat { 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
        }

        .date-separator { 
            text-align: center; 
            margin: 15px 0 10px 0; 
        }

        .date-separator span { 
            background: rgba(24, 37, 51, 0.7); 
            color: #fff; 
            padding: 2px 12px; 
            border-radius: 12px; 
            font-size: 13px; 
            font-weight: 500;
        }

        /* Сообщение с аватаром */
        .message-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            margin-bottom: 2px;
        }

        .user-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            flex-shrink: 0;
            text-transform: uppercase;
        }

        .message-bubble { 
            background: #182533; 
            padding: 6px 10px 20px 10px; 
            border-radius: 12px 12px 12px 4px; 
            max-width: 78%; 
            position: relative; 
        }
        
        /* Имя пользователя — только цвет текста, без рамок */
        .msg-name { 
            font-size: 14px; 
            font-weight: 600; 
            margin-bottom: 2px;
            display: block;
            background: none !important; /* Убираем любые фоны */
            padding: 0 !important;       /* Убираем внутренние отступы */
            border: none !important;      /* Убираем рамки */
        }
        
        .msg-text { 
            font-size: 15px; 
            line-height: 1.4; 
            color: #fff; 
        }
        
        .msg-time { 
            position: absolute; 
            bottom: 4px; 
            right: 8px; 
            font-size: 11px; 
            color: #6b7d90; 
        }

        /* Цвета для имен и аватарок */
        .text-0, .bg-0 { color: #ee675c; } .bg-0 { background: #ee675c; color: #fff; }
        .text-1, .bg-1 { color: #4ec034; } .bg-1 { background: #4ec034; color: #fff; }
        .text-2, .bg-2 { color: #f09a37; } .bg-2 { background: #f09a37; color: #fff; }
        .text-3, .bg-3 { color: #50a2e3; } .bg-3 { background: #50a2e3; color: #fff; }
        .text-4, .bg-4 { color: #a695e7; } .bg-4 { background: #a695e7; color: #fff; }
        .text-5, .bg-5 { color: #ef799e; } .bg-5 { background: #ef799e; color: #fff; }
        .text-6, .bg-6 { color: #4cc6ac; } .bg-6 { background: #4cc6ac; color: #fff; }
    </style>
</head>
<body>

    <div class="header">
        <h1>EROS</h1>
        <p>1,500 members</p>
    </div>

    <div class="chat" id="chat-container"></div>

            { name: "kyle_b", text: "$100. I'm a loyal customer, hook me up." },

            { name: "mason_m", text: "$500 for the ultimate experience pics." },
            { name: "noah_a", text: "$200 for a quick snap?" },
            { name: "oliver_t", text: "Please, I'll pay $100." },
            { name: "peter_p", text: "$300 for the good stuff?" },
            { name: "quinn_m", text: "$400 is my final offer." },
            { name: "robert_d", text: "I have $500 for u." },
            { name: "sam_s", text: "$200. Let's do this." }
        ];

        function getColorIndex(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }
            return Math.abs(hash) % 7;
        }

        const chatContainer = document.getElementById('chat-container');
        let commentIndex = 0;

        for (let day = 1; day <= 15; day++) {
            const dateDiv = document.createElement('div');
            dateDiv.className = 'date-separator';
            dateDiv.innerHTML = `<span>April ${day}</span>`;
            chatContainer.appendChild(dateDiv);

            let commentsToday = (day % 3 === 0) ? 4 : 3; 
            let currentHour = Math.floor(Math.random() * 8) + 8;
            let currentMinute = Math.floor(Math.random() * 60);

            for (let i = 0; i < commentsToday; i++) {
                if (commentIndex >= comments.length) break;
                const comment = comments[commentIndex];
                const timeString = `${currentHour.toString().padStart(2, '0')}:${currentMinute.toString().padStart(2, '0')}`;
                
                const cIdx = getColorIndex(comment.name);
                const initial = comment.name.charAt(0).toUpperCase();

                const rowDiv = document.createElement('div');
                rowDiv.className = 'message-row';
                rowDiv.innerHTML = `
                    <div class="user-avatar bg-${cIdx}">${initial}</div>
                    <div class="message-bubble">
                        <span class="msg-name text-${cIdx}">${comment.name}</span>
                        <div class="msg-text">${comment.text}</div>
                        <div class="msg-time">${timeString}</div>
                    </div>
                `;
                chatContainer.appendChild(rowDiv);

                currentMinute += Math.floor(Math.random() * 45) + 5;
                if (currentMinute >= 60) {
                    currentHour += 1;
                    currentMinute -= 60;
                }
                commentIndex++;
            }
        }
    </script>
</body>
</html>
