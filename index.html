<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EROS</title>
    <style>
        /* Базовые стили под темную тему Telegram */
        body { 
            background: #0e1621; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
        }
        
        /* Шапка */
        .header { 
            background: #17212b; 
            padding: 10px 15px; 
            display: flex; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 10; 
            border-bottom: 1px solid #242f3d; 
        }
        
        /* Аватарка группы */
        .avatar { 
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            background: linear-gradient(135deg, #1e3c72, #2a5298); 
            margin-right: 15px; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            color: white;
        }
        
        /* Текст в шапке */
        .info h1 { margin: 0; font-size: 18px; font-weight: 600; letter-spacing: 0.5px; }
        .info p { margin: 0; font-size: 13px; color: #7f91a4; }
        
        /* Область чата */
        .chat { 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            padding-bottom: 30px; 
        }
        
        /* Разделитель дат */
        .date-separator { text-align: center; margin: 10px 0; }
        .date-separator span { 
            background: #182533; 
            color: #7f91a4; 
            padding: 4px 12px; 
            border-radius: 12px; 
            font-size: 12px; 
            font-weight: 500;
        }
        
        /* Пузырь сообщения */
        .message { 
            background: #182533; 
            padding: 8px 12px; 
            border-radius: 12px; 
            border-bottom-left-radius: 4px; 
            max-width: 85%; 
            align-self: flex-start; 
            position: relative; 
        }
        
        /* Имя пользователя */
        .msg-name { color: #64b5f6; font-size: 13px; font-weight: 500; margin-bottom: 4px; }
        
        /* Текст комментария */
        .msg-text { 
            font-size: 15px; 
            line-height: 1.4; 
            color: #e1e8e8; 
            margin-bottom: 12px; /* Место под время */
            padding-right: 35px; /* Чтобы текст не налезал на время */
        }
        
        /* Время сообщения */
        .msg-time { 
            position: absolute; 
            bottom: 6px; 
            right: 10px; 
            font-size: 11px; 
            color: #6b7d90; 
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="avatar">E</div>
        <div class="info">
            <h1>EROS</h1>
            <p>1.5k members</p>

    </div>

    <div class="chat" id="chat-container"></div>

            { name: "ryan_h", text: "can u do customs? I have $300 ready for the right pics." },
            { name: "Dan_M", text: "$400 if you can verify right now." },

            { name: "Paul_W", text: "$500 straight up. No games. DM me ur link." },

            { name: "ethan_hunt", text: "$200 is my limit, hope that's enough for the premium stuff." },
            { name: "zack_m", text: "$100. Crypto or Cashapp, u choose." },
            { name: "Tony_M", text: "I only deal in high quality. $400 for your best set." },
            { name: "lucas_90", text: "$100 for a taste? If I like it, I'll send more." },

            { name: "eric_c", text: "$300!!! PLS SEND" },

            { name: "colin_f", text: "I'll do $100, but I need proof of life first." },
            { name: "derek_h", text: "$300 for a 1 on 1?" },
            { name: "evan_r", text: "$500. Just tell me where to send it in USDT." },
            { name: "frank_c", text: "$200 for a quick tease?" },
            { name: "george_c", text: "I'm good for $100. Check ur messages." },
            { name: "harry_p", text: "$300. Please respond, I've been waiting all day." },
            { name: "isaac_n", text: "$200. Is that enough for the VIP tier?" },
            { name: "jacob_b", text: "$400 for the whole archive. Deal?" },
            { name: "kyle_b", text: "$100. I'm a loyal customer, hook me up." },
            { name: "liam_n", text: "I have a very specific set of requests... $300." },
            { name: "mason_m", text: "$500 for the ultimate experience pics." },
            { name: "noah_a", text: "$200 for a quick snap?" },
            { name: "oliver_t", text: "Please, I'll pay $100." },
            { name: "peter_p", text: "$300 for the good stuff?" },
            { name: "quinn_m", text: "$400 is my final offer." },
            { name: "robert_d", text: "I have $500 for u." },
            { name: "sam_s", text: "$200. Let's do this." }
        ];

        const chatContainer = document.getElementById('chat-container');
        let commentIndex = 0;

        // Генерация дней с 1 по 15 апреля
        for (let day = 1; day <= 15; day++) {
            // Добавляем плашку с датой
            const dateDiv = document.createElement('div');
            dateDiv.className = 'date-separator';
            dateDiv.innerHTML = `<span>April ${day}</span>`;
            chatContainer.appendChild(dateDiv);

            // Рандомно 3 или 4 комментария в день, чтобы уложить 50 штук в 15 дней
            let commentsToday = (day % 3 === 0) ? 4 : 3; 

            // Переменная для времени, чтобы оно шло по нарастающей в течение дня
            let currentHour = Math.floor(Math.random() * 8) + 8; // Старт между 8:00 и 15:00
            let currentMinute = Math.floor(Math.random() * 60);

            for (let i = 0; i < commentsToday; i++) {
                if (commentIndex >= comments.length) break;

                const comment = comments[commentIndex];
                
                // Форматируем время (например 09:05)
                const timeString = `${currentHour.toString().padStart(2, '0')}:${currentMinute.toString().padStart(2, '0')}`;

                // Создаем сообщение
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message';
                msgDiv.innerHTML = `
                    <div class="msg-name">${comment.name}</div>
                    <div class="msg-text">${comment.text}</div>
                    <div class="msg-time">${timeString}</div>
                `;
                chatContainer.appendChild(msgDiv);

                // Увеличиваем время для следующего сообщения в этот же день
                currentMinute += Math.floor(Math.random() * 45) + 5;
                if (currentMinute >= 60) {
                    currentHour += 1;
                    currentMinute -= 60;
                }
                
                commentIndex++;
            }
        }
    </script>
</body>
</html>
